name: CI

on:
  push:
    branches:
      - main
      - develop
      - feature/**
  pull_request:
    branches:
      - main
      - develop

jobs:
  backend-build:
    name: Backend Restore, Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore solution
        run: dotnet restore HiveApps.slnx

      - name: Build solution
        run: dotnet build HiveApps.slnx --configuration Release --no-restore

      - name: Verify formatting (dotnet format)
        run: dotnet format HiveApps.slnx --verify-no-changes --verbosity minimal

      - name: Run tests (if test projects exist)
        shell: bash
        run: |
          if find backend/tests -name "*.csproj" -print -quit | grep -q .; then
            dotnet test HiveApps.slnx --configuration Release --no-build
          else
            echo "No test projects found under backend/tests. Skipping test execution."
          fi